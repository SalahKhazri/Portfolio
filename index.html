<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Intro - Salah Eddine Khazri</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      overflow: hidden;
    }

    #intro {
      position: fixed;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    h1 {
      color: white;
      font-size: 3rem;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8;
    }

    .cursor {
      display: inline-block;
      width: 3px;
      height: 40px;
      background: #38bdf8;
      margin-left: 5px;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Fade out animation */
    .fade-out {
      animation: fadeOut 1.5s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(1.2);
      }
    }
  </style>
</head>

<body>

<div id="intro">
  <h1 id="text"></h1><span class="cursor"></span>
</div>

<script>
  const text = "Salah Eddine Khazri";
  let i = 0;
  const speed = 100;
  const element = document.getElementById("text");

  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else {
      // Attendre puis disparaître
      setTimeout(() => {
        document.getElementById("intro").classList.add("fade-out");
      }, 1000);

      // Redirection vers ton portfolio
      setTimeout(() => {
        window.location.href = "home.html"; // 🔥 change avec ta vraie page
      }, 2500);
    }
  }

  typing();
</script>

</body>
</html>
